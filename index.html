<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AVEX.tv — Gestion de production</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--ac:#D85A30;--acd:#993C1D;--gn:#1D9E75;--am:#BA7517;--rd:#A32D2D;--bl:#185FA5;
--bg:#fff;--bg2:#f7f6f3;--bg3:#f0efe9;--bd:rgba(0,0,0,.12);--bd2:rgba(0,0,0,.22);
--tx:#1a1a1a;--tx2:#6b6b6b;--r:8px;--rl:12px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--tx);font-size:13px;background:var(--bg3);min-height:100vh}
.app{max-width:1200px;margin:0 auto;padding:.75rem}
.top{display:flex;align-items:center;justify-content:space-between;padding:.875rem 1.25rem;background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);margin-bottom:.75rem;box-shadow:0 1px 3px rgba(0,0,0,.06);flex-wrap:wrap;gap:8px}
.logo{font-size:20px;font-weight:600;letter-spacing:-.5px}.logo em{color:var(--ac);font-style:normal}
.logo small{font-size:12px;font-weight:400;color:var(--tx2);margin-left:8px}
.sbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.dot{width:8px;height:8px;border-radius:50%;background:#ccc;flex-shrink:0}
.dot.gn{background:var(--gn)}.dot.rd{background:var(--rd)}.dot.am{background:var(--am)}
.stxt{font-size:11px;color:var(--tx2)}
.flash{font-size:11px;color:var(--gn);padding:2px 8px;border-radius:var(--r);background:#EAF3DE;display:none}
.flash.on{display:inline-block}
.sbtn{display:flex;align-items:center;gap:5px;padding:5px 11px;font-size:12px;border:0.5px solid var(--bd2);border-radius:var(--r);cursor:pointer;background:var(--bg);color:var(--tx)}
.sbtn:hover{background:var(--bg2)}
.saving{font-size:11px;color:var(--am);padding:2px 8px;background:#FAEEDA;border-radius:var(--r);display:none}
.saving.on{display:inline-block}
.nav{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:.75rem}
.nb{padding:6px 13px;font-size:12px;border:0.5px solid var(--bd);border-radius:var(--r);cursor:pointer;background:var(--bg2);color:var(--tx2);white-space:nowrap;transition:all .15s}
.nb.on{background:var(--bg);color:var(--tx);border-color:var(--bd2);font-weight:500;box-shadow:0 1px 2px rgba(0,0,0,.08)}
.nb:hover:not(.on){background:var(--bg);color:var(--tx)}
.pg{display:none}.pg.on{display:block}
.card{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);margin-bottom:.75rem;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.ch{padding:.625rem 1rem;border-bottom:0.5px solid var(--bd);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.ct{font-size:13px;font-weight:500}
.btn{padding:5px 11px;font-size:12px;border:0.5px solid var(--bd2);border-radius:var(--r);cursor:pointer;background:var(--bg2);color:var(--tx);transition:all .15s}
.btn:hover{background:var(--bg)}.btn.p{background:var(--ac);color:#fff;border-color:var(--ac)}.btn.p:hover{background:var(--acd)}
.btn.sm{padding:3px 9px;font-size:11px}.btn.rd{background:#FCEBEB;color:var(--rd);border-color:#F7C1C1}.btn.rd:hover{background:#F7C1C1}
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:6px 10px;text-align:left;font-weight:500;font-size:11px;color:var(--tx2);border-bottom:0.5px solid var(--bd);white-space:nowrap;background:var(--bg2);position:sticky;top:0}
td{padding:5px 9px;border-bottom:0.5px solid var(--bd);vertical-align:middle;color:var(--tx)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}
td input,td select,td textarea{width:100%;background:transparent;border:none;font-size:12px;color:var(--tx);font-family:inherit;padding:1px 2px;min-width:60px}
td input:focus,td select:focus,td textarea:focus{outline:none;background:#EBF4FF;border-radius:3px;padding:1px 5px}
td input[type=checkbox]{width:auto;min-width:0}
.bx{display:inline-block;padding:2px 7px;border-radius:var(--r);font-size:11px;font-weight:500;white-space:nowrap}
.bx.g{background:#EAF3DE;color:#3B6D11}.bx.a{background:#FAEEDA;color:#854F0B}
.bx.r{background:#FCEBEB;color:#A32D2D}.bx.b{background:#E6F1FB;color:#185FA5}
.bx.gr{background:var(--bg2);color:var(--tx2)}
.fr{display:flex;gap:8px;flex-wrap:wrap;padding:.625rem 1rem;border-bottom:0.5px solid var(--bd);align-items:center}
.fr select,.fr input[type=text]{padding:5px 8px;font-size:12px;border:0.5px solid var(--bd2);border-radius:var(--r);background:var(--bg2);color:var(--tx)}
.sf{display:flex;gap:3px;flex-wrap:wrap;padding:.625rem 1rem;border-bottom:0.5px solid var(--bd);align-items:center}
.sfb{padding:3px 9px;font-size:11px;border:0.5px solid var(--bd);border-radius:var(--r);cursor:pointer;background:var(--bg2);color:var(--tx2)}
.sfb.on{background:var(--tx);color:var(--bg)}
.ar{padding:.5rem 1rem;border-top:0.5px solid var(--bd);display:flex;gap:8px;align-items:center;background:var(--bg2);flex-wrap:wrap}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:.75rem}
.stat{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--r);padding:.875rem 1rem}
.stat-l{font-size:11px;color:var(--tx2);margin-bottom:3px}
.stat-v{font-size:22px;font-weight:600}
.c-gn{color:var(--gn)}.c-am{color:var(--am)}.c-rd{color:var(--rd)}
.db2{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:.75rem}
.del-btn{padding:2px 7px;font-size:11px;color:var(--rd);border:0.5px solid #F7C1C1;border-radius:var(--r);cursor:pointer;background:#FCEBEB;opacity:.7;white-space:nowrap}
.del-btn:hover{opacity:1}
.edit-btn{padding:2px 7px;font-size:11px;color:var(--bl);border:0.5px solid #B5D4F4;border-radius:var(--r);cursor:pointer;background:#E6F1FB;white-space:nowrap}
.edit-btn:hover{background:#B5D4F4}
.lnk{color:var(--bl);text-decoration:none;font-size:11px}.lnk:hover{text-decoration:underline}
.loader{display:flex;align-items:center;gap:8px;padding:3rem 1.5rem;color:var(--tx2);font-size:13px}
.spin{width:18px;height:18px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:sp .8s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.err{background:#FCEBEB;border:0.5px solid #F7C1C1;border-radius:var(--r);padding:12px 16px;margin:.75rem;font-size:12px;color:var(--rd);line-height:1.6}
.warn{background:#FAEEDA;border:0.5px solid #FAC775;border-radius:var(--rl);padding:8px 14px;margin-bottom:.75rem;font-size:12px;color:#854F0B}
.ep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;padding:1rem}
.ep-c{background:var(--bg2);border:0.5px solid var(--bd);border-radius:var(--r);padding:10px 12px}
.ep-num{font-size:10px;color:var(--tx2);margin-bottom:2px}
.ep-ti{font-size:12px;font-weight:500;margin-bottom:6px}
.ep-links{display:flex;gap:5px;flex-wrap:wrap}
.vlnk{display:inline-flex;align-items:center;padding:3px 9px;border-radius:var(--r);font-size:11px;font-weight:500;text-decoration:none;border:0.5px solid var(--bd2)}
.vlnk.fr{background:#FAEEDA;color:#854F0B}.vlnk.en{background:#E6F1FB;color:#185FA5}.vlnk.xt{background:var(--bg2);color:var(--tx2)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
.modal-bg.on{display:flex}
.modal{background:var(--bg);border-radius:var(--rl);border:0.5px solid var(--bd2);padding:1.5rem;width:min(580px,94vw);max-height:88vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.25)}
.modal h3{font-size:15px;font-weight:600;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:0.5px solid var(--bd)}
.ff{margin-bottom:11px}
.ff label{display:block;font-size:11px;color:var(--tx2);margin-bottom:3px;font-weight:500;text-transform:uppercase;letter-spacing:.3px}
.ff input,.ff select,.ff textarea{width:100%;padding:7px 10px;font-size:13px;border:0.5px solid var(--bd2);border-radius:var(--r);background:var(--bg2);color:var(--tx);font-family:inherit;transition:border-color .15s}
.ff input:focus,.ff select:focus,.ff textarea:focus{outline:none;border-color:var(--ac);background:var(--bg)}
.gr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.gr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.ma{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem;padding-top:1rem;border-top:0.5px solid var(--bd)}
.rel{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;background:#E6F1FB;color:var(--bl);border-radius:var(--r);font-size:11px;cursor:pointer;border:0.5px solid #B5D4F4}
.rel:hover{background:#B5D4F4}
.section-label{font-size:11px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px;padding:.5rem 1rem;background:var(--bg2);border-bottom:0.5px solid var(--bd)}
.info-box{background:#E6F1FB;border:0.5px solid #B5D4F4;border-radius:var(--r);padding:10px 14px;margin:.75rem;font-size:12px;color:#0c447c;line-height:1.6}
.write-warn{background:#FAEEDA;border:0.5px solid #FAC775;border-radius:var(--r);padding:8px 14px;font-size:11px;color:#854F0B;margin-bottom:8px}
</style>
</head>
<body>
<div class="app">

<div class="top">
  <div class="logo">AVEX<em>.tv</em><small>— Système de gestion de production</small></div>
  <div class="sbar">
    <div class="dot" id="dot"></div>
    <span class="stxt" id="stxt">Connexion...</span>
    <span class="flash" id="flash">✓ Sauvegardé</span>
    <span class="saving" id="saving">Sauvegarde...</span>
    <button class="sbtn" onclick="syncAll()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
      Synchroniser
    </button>
  </div>
</div>

<div class="nav" id="nav">
  <button class="nb on" onclick="goTab('dash',this)">Tableau de bord</button>
  <button class="nb" onclick="goTab('tournages',this)">Tournages</button>
  <button class="nb" onclick="goTab('diffusion',this)">Diffusion TV</button>
  <button class="nb" onclick="goTab('ordre',this)">Ordre saisons</button>
  <button class="nb" onclick="goTab('commanditaires',this)">Commanditaires</button>
  <button class="nb" onclick="goTab('produits',this)">Produits</button>
  <button class="nb" onclick="goTab('episodes',this)">Épisodes Web</button>
  <button class="nb" onclick="goTab('sodec',this)">SODEC</button>
  <button class="nb" onclick="goTab('taches',this)">À faire</button>
</div>

<div id="pg-dash" class="pg on"><div class="loader"><div class="spin"></div>Connexion à Google Sheets...</div></div>
<div id="pg-tournages" class="pg"></div>
<div id="pg-diffusion" class="pg"></div>
<div id="pg-ordre" class="pg"></div>
<div id="pg-commanditaires" class="pg"></div>
<div id="pg-produits" class="pg"></div>
<div id="pg-episodes" class="pg"></div>
<div id="pg-sodec" class="pg"></div>
<div id="pg-taches" class="pg"></div>

</div>

<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-inner"></div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────
const SHEET_ID = '1iCVODe1UtFLsRYF8_0OqgWZOAyvQ6eGqOZlAb48dpvM';
const API_KEY  = 'AIzaSyBEN4TDDzVxDaTJkA7NEKDJex6P6oN6ae8';
const BASE_URL = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}`;

// Apps Script URL pour l'écriture — laisser vide si pas encore configuré
let WRITE_URL = localStorage.getItem('avex_write_url') || '';

let GS = {};
let currentTab = 'dash';

// ── UTILITAIRES ──────────────────────────────────────────────
function setStatus(s,msg){document.getElementById('dot').className='dot '+s;document.getElementById('stxt').textContent=msg;}
function showFlash(){const f=document.getElementById('flash');f.classList.add('on');setTimeout(()=>f.classList.remove('on'),3000);}
function setSaving(v){document.getElementById('saving').classList[v?'add':'remove']('on');}
function bx(v,c='gr'){return`<span class="bx ${c}">${v||'—'}</span>`;}
function payBx(v){if(!v||v==='-'||!String(v).trim())return bx('—');const l=String(v).toLowerCase();return l.includes('payé')?bx(v,'g'):l.includes('attente')||l.includes('facturer')||l.includes('relancer')||l.includes('envoyé')?bx(v,'a'):bx(v,'gr');}
function etBx(v){if(!v||v==='-'||!String(v).trim())return bx('—');const l=String(v).toLowerCase();return l.includes('signé')||l==='signe'?bx(v,'g'):l.includes('confirmer')||l.includes('relancer')?bx(v,'a'):l.includes('pas de')||l.includes('non')?bx(v,'r'):bx(v,'gr');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function openModal(html){document.getElementById('modal-inner').innerHTML=html;document.getElementById('modal-bg').classList.add('on');}
function closeModal(){document.getElementById('modal-bg').classList.remove('on');}
function rows(sheet,skip=1){return(GS[sheet]||[]).slice(skip).filter(r=>r?.some(c=>String(c||'').trim()));}
function v(r,i){return String(r?.[i]||'').trim();}

// ── LECTURE (Google Sheets API) ───────────────────────────────
async function fetchSheet(range) {
  const url = `${BASE_URL}/values/${encodeURIComponent(range)}?key=${API_KEY}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const d = await r.json();
  return d.values || [];
}

const SHEETS_LIST = [
  'Calendrier tournages',
  'Commanditaires',
  'Ordre de diffusion TV',
  'à faire',
  'Produits de commandites',
  'Épisodes WEB',
  'SODEC',
  'ordre Diffusion'
];

async function loadAll() {
  setStatus('am','Chargement...');
  try {
    const results = await Promise.all(
      SHEETS_LIST.map(s => fetchSheet(s + '!A1:AD200').catch(() => []))
    );
    SHEETS_LIST.forEach((s,i) => GS[s] = results[i]);
    setStatus('gn', `Connecté · ${new Date().toLocaleTimeString('fr-CA')}`);
    return true;
  } catch(e) {
    setStatus('rd', 'Erreur: ' + e.message);
    return false;
  }
}

async function reloadSheet(sheet) {
  GS[sheet] = await fetchSheet(sheet + '!A1:AD200').catch(() => []);
}

// ── ÉCRITURE (Apps Script) ────────────────────────────────────
async function apiPost(payload) {
  if (!WRITE_URL) {
    showWriteSetup();
    return null;
  }
  setSaving(true);
  try {
    const r = await fetch(WRITE_URL, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    showFlash();
    return d;
  } finally {
    setSaving(false);
  }
}

function showWriteSetup() {
  openModal(`<h3>⚙️ Configuration de l'écriture</h3>
    <p style="font-size:13px;color:var(--tx2);margin-bottom:16px">Pour pouvoir modifier les données, tu dois déployer un Google Apps Script. Voici les étapes :</p>
    <div style="background:var(--bg2);border-radius:var(--r);padding:12px;font-size:12px;line-height:1.8;margin-bottom:16px">
      <strong>1.</strong> Ouvre ton Google Sheet<br>
      <strong>2.</strong> Menu <strong>Extensions → Apps Script</strong><br>
      <strong>3.</strong> Efface le code existant et colle le code ci-dessous<br>
      <strong>4.</strong> Clique <strong>Déployer → Nouveau déploiement</strong><br>
      <strong>5.</strong> Type : Application Web · Accès : Tout le monde<br>
      <strong>6.</strong> Copie l'URL générée et colle-la ici
    </div>
    <div style="background:#1a1a1a;border-radius:var(--r);padding:12px;font-size:11px;color:#e6edf3;font-family:monospace;line-height:1.6;margin-bottom:16px;overflow-x:auto;white-space:pre">function doGet(e){return doPost(e)}
function doPost(e){
  try{
    var p=JSON.parse(e.postData.contents);
    var ss=SpreadsheetApp.openById('${SHEET_ID}');
    var sh=ss.getSheetByName(p.sheet);
    if(!sh)return out({error:'Sheet not found: '+p.sheet});
    if(p.action==='update'){
      sh.getRange(p.row,p.col).setValue(p.value);
      return out({ok:true});
    }
    if(p.action==='append'){
      sh.appendRow(p.row);
      return out({ok:true});
    }
    if(p.action==='delete'){
      sh.deleteRow(p.row);
      return out({ok:true});
    }
    return out({error:'Unknown action'});
  }catch(err){return out({error:err.message});}
}
function out(d){
  return ContentService.createTextOutput(JSON.stringify(d))
    .setMimeType(ContentService.MimeType.JSON);
}</div>
    <div class="ff"><label>URL de ton Apps Script déployé</label>
      <input id="write-url" placeholder="https://script.google.com/macros/s/..." value="${esc(WRITE_URL)}">
    </div>
    <div class="ma">
      <button class="btn" onclick="closeModal()">Annuler</button>
      <button class="btn p" onclick="saveWriteUrl()">Enregistrer l'URL</button>
    </div>`);
}

window.saveWriteUrl = function() {
  const url = document.getElementById('write-url').value.trim();
  if (!url) return alert('Entre l\'URL du Apps Script');
  WRITE_URL = url;
  localStorage.setItem('avex_write_url', url);
  closeModal();
  showFlash();
};

// ── NAVIGATION ───────────────────────────────────────────────
function goTab(id, el) {
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('pg-'+id).classList.add('on');
  el.classList.add('on');
  currentTab = id;
  ({dash:rDash,tournages:rTour,diffusion:rDiff,ordre:rOrdre,commanditaires:rSpons,produits:rProd,episodes:rEp,sodec:rSodec,taches:rTask})[id]?.();
}

async function syncAll() {
  setStatus('am','Synchronisation...');
  const ok = await loadAll();
  if (ok) ({dash:rDash,tournages:rTour,diffusion:rDiff,ordre:rOrdre,commanditaires:rSpons,produits:rProd,episodes:rEp,sodec:rSodec,taches:rTask})[currentTab]?.();
}

// ── TABLEAU DE BORD ───────────────────────────────────────────
function rDash() {
  const pg = document.getElementById('pg-dash');
  const tour = rows('Calendrier tournages');
  const sp = rows('Commanditaires');
  const conf = tour.filter(r=>v(r,13)==='x'||v(r,13)==='X').length;
  const signes = sp.filter(r=>v(r,2).toLowerCase().includes('signé')).length;
  const payes = sp.filter(r=>v(r,8).toLowerCase().includes('payé')).length;
  const warns = sp.filter(r=>v(r,2).toLowerCase().includes('relancer'));
  const attente = sp.filter(r=>{const p=v(r,8).toLowerCase();return p&&!p.includes('payé')&&p!=='n/a'&&p!=='interne';}).length;

  pg.innerHTML = `
    <div class="stats">
      <div class="stat"><div class="stat-l">Tournages planifiés</div><div class="stat-v">${tour.length}</div></div>
      <div class="stat"><div class="stat-l">Confirmés</div><div class="stat-v c-gn">${conf}</div></div>
      <div class="stat"><div class="stat-l">À confirmer</div><div class="stat-v c-am">${tour.length-conf}</div></div>
      <div class="stat"><div class="stat-l">Commanditaires</div><div class="stat-v">${sp.length}</div></div>
      <div class="stat"><div class="stat-l">Contrats signés</div><div class="stat-v c-gn">${signes}</div></div>
      <div class="stat"><div class="stat-l">Factures payées</div><div class="stat-v c-gn">${payes}</div></div>
      <div class="stat"><div class="stat-l">Suivi requis</div><div class="stat-v c-am">${attente}</div></div>
    </div>
    ${warns.length?`<div class="warn">⚠ Commanditaires à relancer : ${warns.map(r=>v(r,1)).join(', ')}</div>`:''}
    <div class="db2">
      <div class="card"><div class="ch"><span class="ct">Tournages non confirmés</span></div>
        <div class="tw"><table><thead><tr><th>Espèce</th><th>Caméra</th><th>Date</th><th>Endroit</th></tr></thead>
        <tbody>${tour.filter(r=>v(r,13)!=='x'&&v(r,13)!=='X').slice(0,8).map(r=>`<tr><td>${esc(v(r,0))}</td><td>${esc(v(r,1))}</td><td>${esc(v(r,5))}</td><td>${esc(v(r,7))}</td></tr>`).join('')||'<tr><td colspan="4" style="color:var(--tx2);text-align:center;padding:1rem">Tous les tournages sont confirmés ✓</td></tr>'}
        </tbody></table></div>
      </div>
      <div class="card"><div class="ch"><span class="ct">Paiements en attente</span></div>
        <div class="tw"><table><thead><tr><th>S.</th><th>Commanditaire</th><th>Argent</th><th>Statut</th></tr></thead>

  const fs=document.getElementById('sf-sp')?.value||'';
  const fe=document.getElementById('ef-sp')?.value||'';
  const fq=(document.getElementById('sq')?.value||'').toLowerCase();
  const prods=GS['Produits de commandites']||[];
  function pc(nom,sais){return prods.slice(1).filter(r=>String(r[0]||'').toLowerCase().trim()===nom.toLowerCase().trim()&&String(r[1]||'')==String(sais)).length;}

    return true;

  const rowIdx=r=>_sData.indexOf(r)+2;

    <td style="font-weight:500">${esc(v(r,0))}</td>

    <td><input value="${esc(v(r,2))}" onchange="updateCell('Produits de commandites',${rowIdx(r)},3,this.value)" style="min-width:180px"></td>
    <td><input value="${esc(v(r,3))}" onchange="updateCell('Produits de commandites',${rowIdx(r)},4,this.value)" style="min-width:70px"></td>
    <td><select onchange="updateCell('Produits de commandites',${rowIdx(r)},5,this.value)"><option${!v(r,4)||v(r,4)==='Non'?' selected':''}>Non</option><option${v(r,4)==='Oui'?' selected':''}>Oui</option></select></td>
    <td><input value="${esc(v(r,5))}" onchange="updateCell('Produits de commandites',${rowIdx(r)},6,this.value)" style="min-width:100px"></td>
    <td><button class="del-btn" onclick="deleteRow('Produits de commandites',${rowIdx(r)},rProd)">Supprimer</button></td>
  </tr>`).join('')||'<tr><td colspan="7" style="text-align:center;padding:1.5rem;color:var(--tx2)">Aucun résultat</td></tr>';
}
function openAddProduit(){
  openModal(`<h3>Nouveau produit de commandite</h3>
    <div class="gr2">
      <div class="ff"><label>Commanditaire</label><input id="np-c" placeholder="Nom exact"></div>
      <div class="ff"><label>Saison</label><input id="np-s" type="number" placeholder="3"></div>
    </div>
    <div class="ff"><label>Produit fourni</label><input id="np-p" placeholder="Vêtements de chasse, équipement..."></div>
    <div class="gr2">
      <div class="ff"><label>Valeur</label><input id="np-v" placeholder="5 000$"></div>
      <div class="ff"><label>Reçu?</label><select id="np-r"><option>Non</option><option>Oui</option></select></div>
    </div>
    <div class="ff"><label>Emplacement / notes</label><input id="np-e"></div>
    <div class="ma">
      <button class="btn" onclick="closeModal()">Annuler</button>
      <button class="btn p" onclick="saveProduit()">Ajouter</button>
    </div>`);
}
async function saveProduit(){
  try{await apiPost({action:'append',sheet:'Produits de commandites',row:[document.getElementById('np-c').value,document.getElementById('np-s').value,document.getElementById('np-p').value,document.getElementById('np-v').value,document.getElementById('np-r').value,document.getElementById('np-e').value]});closeModal();await reloadSheet('Produits de commandites');rProd();}catch(e){alert('Erreur: '+e.message);}
}

// ── ÉPISODES WEB ──────────────────────────────────────────────
function rEp(){
  const raw=GS['Épisodes WEB']||[];
  const groups={};let s=1;
  raw.slice(2).forEach(r=>{
    const c=String(r[2]||'').trim();
    if(/^S0?[1-9]$/.test(c)){s=parseInt(c.replace('S',''));return;}
    if(r[0]&&String(r[0]).startsWith('EP'))
      (groups[s]=groups[s]||[]).push({ep:r[0],fr:r[2],ti:r[3],en:r[6],xt:r[8]||r[9]||''});
  });
  const seasons=Object.keys(groups).map(Number).sort((a,b)=>a-b);
  document.getElementById('pg-episodes').innerHTML=`
    <div class="card">
      <div class="ch"><span class="ct">Épisodes web — Liens YouTube par saison</span></div>
      <div class="sf" id="sf-ep">
        <span style="font-size:11px;color:var(--tx2);margin-right:4px">Saison :</span>
        ${seasons.map(s=>`<button class="sfb${s===1?' on':''}" onclick="setEpSF(${s},this)">S${s} (${(groups[s]||[]).length} ép.)</button>`).join('')}
      </div>
      <div class="ep-grid" id="ep-grid"></div>
    </div>`;
  window._epGroups=groups;
  renderEps(seasons[0]||1);
  window.setEpSF=(s,el)=>{document.querySelectorAll('#sf-ep .sfb').forEach(b=>b.classList.remove('on'));el.classList.add('on');renderEps(s);};
}
function renderEps(s){
  document.getElementById('ep-grid').innerHTML=(window._epGroups[s]||[]).map(e=>`<div class="ep-c">
    <div class="ep-num">S${s} — ${esc(e.ep)}</div>
    <div class="ep-ti">${esc(e.ti||'—')}</div>
    <div class="ep-links">
      ${e.fr&&String(e.fr).startsWith('http')?`<a href="${esc(e.fr)}" class="vlnk fr" target="_blank">FR</a>`:''}
      ${e.en&&String(e.en).startsWith('http')?`<a href="${esc(e.en)}" class="vlnk en" target="_blank">EN</a>`:''}
      ${e.xt&&String(e.xt).startsWith('http')?`<a href="${esc(e.xt)}" class="vlnk xt" target="_blank">Extra</a>`:''}
    </div>
  </div>`).join('');
}

// ── SODEC ─────────────────────────────────────────────────────
function rSodec(){
  const data=rows('SODEC');
  const heads=(GS['SODEC']||[[]])[0]||[];
  document.getElementById('pg-sodec').innerHTML=`
    <div class="card">
      <div class="ch"><span class="ct">SODEC — Suivi des demandes de financement</span></div>
      <div class="tw"><table>
        <thead><tr>${heads.slice(0,9).map(h=>`<th style="max-width:140px;white-space:normal;line-height:1.4">${esc(String(h||''))}</th>`).join('')}</tr></thead>
        <tbody>${data.map(r=>`<tr>${r.slice(0,9).map((c,i)=>
          i===3?`<td>${bx(String(c||''),c==='Complété'?'g':c==='Envoyé'?'b':'a')}</td>`
               :`<td style="font-size:11px;max-width:180px;white-space:normal;line-height:1.4">${esc(String(c||''))}</td>`
        ).join('')}</tr>`).join('')}</tbody>
      </table></div>
    </div>`;
}

// ── À FAIRE ───────────────────────────────────────────────────
function rTask(){
  const raw=GS['à faire']||[];
  let curP='';const parsed=[];
  raw.slice(2).forEach(r=>{
    if(r[0]&&!r[1]&&!r[2])curP=r[0];
    else if(r[1])parsed.push({p:curP,t:r[1],urgent:v(r,2)==='x'||v(r,2)==='X',imp:v(r,3)==='x'||v(r,3)==='X',dos:v(r,4)==='x'||v(r,4)==='X',det:v(r,5)});
  });
  const persons=[...new Set(parsed.map(t=>t.p).filter(Boolean))];
  let filt='all';
  function render(){
    document.getElementById('task-cnt').innerHTML=persons.map(p=>{
      let tasks=parsed.filter(t=>t.p===p);
      if(filt!=='all')tasks=tasks.filter(t=>(filt==='urgent'&&t.urgent)||(filt==='important'&&t.imp)||(filt==='dossier'&&t.dos));
      if(!tasks.length)return'';
      return`<div class="card" style="margin-bottom:.75rem">
        <div class="ch"><span class="ct">${esc(p)}</span><span style="font-size:11px;color:var(--tx2)">${tasks.length} tâche(s)</span></div>
        <div>${tasks.map(t=>`<div style="display:flex;align-items:center;gap:10px;padding:6px 1rem;border-bottom:0.5px solid var(--bd)">
          ${bx(t.urgent?'Urgent':t.imp?'Important':t.dos?'Dossier':'—',t.urgent?'r':t.imp?'a':t.dos?'b':'gr')}
          <span style="flex:1">${esc(t.t)}</span>
          ${t.det?`<span style="font-size:11px;color:var(--tx2);max-width:220px">${esc(t.det)}</span>`:''}
        </div>`).join('')}</div>
      </div>`;
    }).join('');
  }
  document.getElementById('pg-taches').innerHTML=`
    <div style="display:flex;gap:6px;margin-bottom:.75rem;flex-wrap:wrap">
      <button class="btn sm" style="font-weight:600" id="tf-all" onclick="setTaskFilt('all',this)">Toutes</button>
      <button class="btn sm" id="tf-urg" onclick="setTaskFilt('urgent',this)">Urgentes</button>
      <button class="btn sm" id="tf-imp" onclick="setTaskFilt('important',this)">Importantes</button>
      <button class="btn sm" id="tf-dos" onclick="setTaskFilt('dossier',this)">Dossiers</button>
      <button class="btn p sm" onclick="openAddTask()">+ Nouvelle tâche</button>
    </div>
    <div id="task-cnt"></div>`;
  window.setTaskFilt=(f,el)=>{filt=f;document.querySelectorAll('[id^=tf-]').forEach(b=>b.style.fontWeight='');el.style.fontWeight='600';render();};
  render();
}
function openAddTask(){
  const persons=[...new Set(rows('à faire',2).map(r=>r[0]).filter(Boolean))];
  openModal(`<h3>Nouvelle tâche</h3>
    <div class="gr2">
      <div class="ff"><label>Personne</label><select id="ntk-p">${persons.map(p=>`<option>${esc(p)}</option>`).join('')}</select></div>
      <div class="ff"><label>Priorité</label><select id="ntk-pr"><option value="urgent">Urgent</option><option value="important" selected>Important</option><option value="dossier">Dossier</option></select></div>
    </div>
    <div class="ff"><label>Tâche</label><input id="ntk-t" placeholder="Description de la tâche..."></div>
    <div class="ff"><label>Détails (optionnel)</label><input id="ntk-d" placeholder="Date, contexte, notes..."></div>
    <div class="ma">
      <button class="btn" onclick="closeModal()">Annuler</button>
      <button class="btn p" onclick="saveTask()">Ajouter dans Google Sheets</button>
    </div>`);
}
async function saveTask(){
  const pr=document.getElementById('ntk-pr').value;
  try{await apiPost({action:'append',sheet:'à faire',row:[document.getElementById('ntk-p').value,document.getElementById('ntk-t').value,pr==='urgent'?'x':'',pr==='important'?'x':'',pr==='dossier'?'x':'',document.getElementById('ntk-d').value]});closeModal();await reloadSheet('à faire');rTask();}catch(e){alert('Erreur: '+e.message);}
}

// ── CRUD ─────────────────────────────────────────────────────
async function updateCell(sheet,rowIdx,colIdx,value){
  try{await apiPost({action:'update',sheet,row:rowIdx,col:colIdx,value});}
  catch(e){console.error('Update error:',e);}
}
async function deleteRow(sheet,rowIdx,refreshFn){
  if(!confirm('Supprimer cette ligne?'))return;
  try{await apiPost({action:'delete',sheet,row:rowIdx});await reloadSheet(sheet);refreshFn();}
  catch(e){alert('Erreur: '+e.message);}
}

// ── INIT ─────────────────────────────────────────────────────
(async()=>{
  const ok=await loadAll();
  if(ok){rDash();}
  else{
    document.getElementById('pg-dash').innerHTML=`<div class="err">
      <strong>Impossible de se connecter à Google Sheets.</strong><br><br>
      Vérifiez que la clé API est valide et que le Sheet est partagé publiquement.
    </div>`;
  }
})();
</script>
